<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="520" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <rect x="250" y="18" width="400" height="36" rx="8" fill="#7c3aed"/>
  <text x="450" y="42" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Smart Serverless Automation Pipeline</text>

  <!-- ── ROW 1: CI/CD ── -->
  <text x="450" y="80" text-anchor="middle" fill="#8b949e" font-size="11" letter-spacing="2">CI / CD PIPELINE</text>

  <!-- Developer box -->
  <rect x="30" y="92" width="110" height="64" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="85" y="118" text-anchor="middle" font-size="20">👨‍💻</text>
  <text x="85" y="136" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">Developer</text>
  <text x="85" y="150" text-anchor="middle" fill="#8b949e" font-size="9">VS Code</text>

  <!-- Arrow -->
  <line x1="140" y1="124" x2="185" y2="124" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="185,120 193,124 185,128" fill="#7c3aed"/>
  <text x="162" y="116" text-anchor="middle" fill="#8b949e" font-size="9">git push</text>

  <!-- GitHub box -->
  <rect x="193" y="92" width="110" height="64" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="248" y="118" text-anchor="middle" font-size="20">🐙</text>
  <text x="248" y="136" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">GitHub</text>
  <text x="248" y="150" text-anchor="middle" fill="#8b949e" font-size="9">Repository</text>

  <!-- Arrow -->
  <line x1="303" y1="124" x2="348" y2="124" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="348,120 356,124 348,128" fill="#7c3aed"/>
  <text x="325" y="116" text-anchor="middle" fill="#8b949e" font-size="9">trigger</text>

  <!-- GitHub Actions box -->
  <rect x="356" y="92" width="120" height="64" rx="8" fill="#161b22" stroke="#238636" stroke-width="1.5"/>
  <text x="416" y="118" text-anchor="middle" font-size="20">⚙️</text>
  <text x="416" y="136" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">GitHub Actions</text>
  <text x="416" y="150" text-anchor="middle" fill="#8b949e" font-size="9">Build &amp; Push</text>

  <!-- Arrow -->
  <line x1="476" y1="124" x2="521" y2="124" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="521,120 529,124 521,128" fill="#7c3aed"/>
  <text x="498" y="116" text-anchor="middle" fill="#8b949e" font-size="9">push image</text>

  <!-- Docker Hub box -->
  <rect x="529" y="92" width="110" height="64" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="584" y="118" text-anchor="middle" font-size="20">🐳</text>
  <text x="584" y="136" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">Docker Hub</text>
  <text x="584" y="150" text-anchor="middle" fill="#8b949e" font-size="9">Image Registry</text>

  <!-- Arrow -->
  <line x1="639" y1="124" x2="684" y2="124" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="684,120 692,124 684,128" fill="#7c3aed"/>
  <text x="661" y="116" text-anchor="middle" fill="#8b949e" font-size="9">pull</text>

  <!-- Docker Desktop box -->
  <rect x="692" y="92" width="120" height="64" rx="8" fill="#161b22" stroke="#1f6feb" stroke-width="1.5"/>
  <text x="752" y="118" text-anchor="middle" font-size="20">🖥️</text>
  <text x="752" y="136" text-anchor="middle" fill="#c9d1d9" font-size="11" font-weight="600">Docker Desktop</text>
  <text x="752" y="150" text-anchor="middle" fill="#8b949e" font-size="9">Local Runtime</text>

  <!-- ── DIVIDER ── -->
  <line x1="40" y1="178" x2="860" y2="178" stroke="#21262d" stroke-width="1"/>
  <text x="450" y="196" text-anchor="middle" fill="#8b949e" font-size="11" letter-spacing="2">DOCKER COMPOSE SERVICES</text>

  <!-- ── ROW 2: Services ── -->

  <!-- Flask App -->
  <rect x="100" y="208" width="150" height="90" rx="8" fill="#161b22" stroke="#f78166" stroke-width="1.5"/>
  <text x="175" y="238" text-anchor="middle" font-size="24">🐍</text>
  <text x="175" y="258" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Flask App</text>
  <text x="175" y="274" text-anchor="middle" fill="#8b949e" font-size="10">port :5001</text>
  <text x="175" y="288" text-anchor="middle" fill="#f78166" font-size="9">GET /  |  GET /metrics</text>

  <!-- Arrow Flask → Prometheus -->
  <line x1="250" y1="253" x2="330" y2="253" stroke="#e3b341" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="330,249 338,253 330,257" fill="#e3b341"/>
  <text x="290" y="244" text-anchor="middle" fill="#8b949e" font-size="9">scrape /metrics</text>
  <text x="290" y="254" text-anchor="middle" fill="#8b949e" font-size="9">every 5s</text>

  <!-- Prometheus -->
  <rect x="338" y="208" width="150" height="90" rx="8" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="413" y="238" text-anchor="middle" font-size="24">🔥</text>
  <text x="413" y="258" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Prometheus</text>
  <text x="413" y="274" text-anchor="middle" fill="#8b949e" font-size="10">port :9090</text>
  <text x="413" y="288" text-anchor="middle" fill="#e3b341" font-size="9">Metrics Store</text>

  <!-- Arrow Prometheus → Grafana -->
  <line x1="488" y1="253" x2="568" y2="253" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <polygon points="568,249 576,253 568,257" fill="#58a6ff"/>
  <text x="528" y="244" text-anchor="middle" fill="#8b949e" font-size="9">query</text>
  <text x="528" y="254" text-anchor="middle" fill="#8b949e" font-size="9">PromQL</text>

  <!-- Grafana -->
  <rect x="576" y="208" width="150" height="90" rx="8" fill="#161b22" stroke="#f97316" stroke-width="1.5"/>
  <text x="651" y="238" text-anchor="middle" font-size="24">📊</text>
  <text x="651" y="258" text-anchor="middle" fill="#c9d1d9" font-size="12" font-weight="600">Grafana</text>
  <text x="651" y="274" text-anchor="middle" fill="#8b949e" font-size="10">port :3000</text>
  <text x="651" y="288" text-anchor="middle" fill="#f97316" font-size="9">Live Dashboard</text>

  <!-- ── DIVIDER ── -->
  <line x1="40" y1="320" x2="860" y2="320" stroke="#21262d" stroke-width="1"/>
  <text x="450" y="338" text-anchor="middle" fill="#8b949e" font-size="11" letter-spacing="2">MONITORING METRICS</text>

  <!-- Metric cards row -->
  <!-- Card 1 -->
  <rect x="60" y="350" width="180" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="90" y="378" font-size="18">📈</text>
  <text x="120" y="374" fill="#c9d1d9" font-size="11" font-weight="600">app_requests_total</text>
  <text x="120" y="390" fill="#8b949e" font-size="10">Total HTTP hits counter</text>

  <!-- Card 2 -->
  <rect x="260" y="350" width="180" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="290" y="378" font-size="18">⚡</text>
  <text x="320" y="374" fill="#c9d1d9" font-size="11" font-weight="600">rate(...[1m])</text>
  <text x="320" y="390" fill="#8b949e" font-size="10">Requests per second</text>

  <!-- Card 3 -->
  <rect x="460" y="350" width="180" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="490" y="378" font-size="18">🧠</text>
  <text x="520" y="374" fill="#c9d1d9" font-size="11" font-weight="600">process_resident_memory</text>
  <text x="520" y="390" fill="#8b949e" font-size="10">App memory usage</text>

  <!-- Card 4 -->
  <rect x="660" y="350" width="180" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="690" y="378" font-size="18">🟢</text>
  <text x="720" y="374" fill="#c9d1d9" font-size="11" font-weight="600">up{job="flask-app"}</text>
  <text x="720" y="390" fill="#8b949e" font-size="10">App uptime status</text>

  <!-- ── DIVIDER ── -->
  <line x1="40" y1="428" x2="860" y2="428" stroke="#21262d" stroke-width="1"/>

  <!-- File structure -->
  <text x="450" y="448" text-anchor="middle" fill="#8b949e" font-size="11" letter-spacing="2">PROJECT STRUCTURE</text>
  <text x="180" y="468" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="Courier New">app/app.py</text>
  <text x="320" y="468" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="Courier New">Dockerfile</text>
  <text x="450" y="468" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="Courier New">docker-compose.yml</text>
  <text x="610" y="468" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="Courier New">monitoring/prometheus.yml</text>
  <text x="780" y="468" text-anchor="middle" fill="#58a6ff" font-size="10" font-family="Courier New">.github/workflows/deploy.yml</text>

  <!-- Footer -->
  <text x="450" y="500" text-anchor="middle" fill="#30363d" font-size="10">Web Monitoring Project · Docker + GitHub Actions + Prometheus + Grafana</text>

</svg>
